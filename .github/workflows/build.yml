name: Build Serenity APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Debug build (fast, no signing needed) ──────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - uses: actions/upload-artifact@v4
        with:
          name: serenity-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  # ── Release build (signed, upload to Play Store) ───────────────────────
  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    # Only runs on pushes to main/master, not on PRs
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: chmod +x ./gradlew

      # Decode the base64-encoded keystore stored as a GitHub secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/serenity-release.jks

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon
        env:
          ANDROID_HOME:      ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH:     serenity-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: serenity-release
          path: app/build/outputs/apk/release/app-release.apk

      # Optional: upload to Play Store internal track automatically
      # Uncomment and add PLAY_SERVICE_ACCOUNT_JSON secret to enable
      # - name: Upload to Play Store (internal track)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: com.serenity.meditation
      #     releaseFiles: app/build/outputs/apk/release/app-release.apk
      #     track: internal
